  <section class="guest-wishes-section" style="display: none;">
    <div class="flower-top">
      <img src="images/cover/flower-top.png" alt="">
    </div>
    <div class="voice-recorder-container">
      <h2 class="recorder-title">Voice Recorder</h2>

      <!-- Recording indicator -->
      <div class="recording-indicator-container">
        <div class="recording-indicator" id="recordingIndicator">
          <div class="microphone-icon">
            <div class="mic-circle">
              <img src="./images/microphone-2-edit.png" alt="microphone">
            </div>
          </div>
        </div>
      </div>

      <!-- Recording timer -->
      <div class="recording-timer" id="recordingTimer">00:00:00</div>

      <!-- Audio waveform visualizer -->
      <div class="waveform-container">
        <canvas id="visualizer2" class="waveform-canvas"></canvas>
      </div>

      <!-- Control buttons -->
      <div class="recording-controls">
        <button id="recordBtn" class="record-btn idle">Start Recording</button>
      </div>

      <!-- Post-recording controls -->
      <div id="postControls" class="post-controls" style="display:none;">
        <button id="restartRecordingBtn" class="restart-btn">Restart</button>
        <button id="saveRecordingBtn" class="save-btn">Next</button>
      </div>
    </div>

    <audio id="audioPlayback" controls style="display:none;" preload="auto" playsinline webkit-playsinline></audio>
    <div class="flower-bottom">
      <img src="images/cover/flower-bottom.png" alt="">
    </div>
  </section>

  <!-- Remaining sections would continue here... -->

  <script type="module">
    import { SplashScreenComponent } from './src/components/splash-screen/splash-screen.js';

    // Initialize the application
    document.addEventListener('DOMContentLoaded', () => {
      const app = document.getElementById('app');
      
      // Initialize splash screen component
      const splashScreen = new SplashScreenComponent({
        coupleNames: 'Firdaus & Najiha',
        weddingDate: 'December 4th, 2026',
        onStart: () => {
          console.log('Splash screen completed, transitioning to next section...');
          // Here you would transition to the next component
          showBridesGreeting();
        }
      });

      // Create and mount the splash screen
      const splashElement = splashScreen.createElement();
      app.appendChild(splashElement);
      splashScreen.init();

      function showBridesGreeting() {
        const bridesGreetingSection = document.querySelector('.brides-greeting-section');
        if (bridesGreetingSection) {
          bridesGreetingSection.style.display = 'flex';
          // Add your greeting logic here
        }
      }
    });
  </script>

  <!-- Canvas visualization script (to be moved to component later) -->
  <script>
    // Get the canvas element
    const canvas = document.getElementById("visualizer");
    if (canvas) {
      const ctx = canvas.getContext("2d");

      // Match canvas size to its displayed size (to avoid blur)
      const dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.scale(dpr, dpr);

      // Set line style
      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;

      // Draw a horizontal line in the center
      const midY = canvas.clientHeight / 2;
      ctx.beginPath();
      ctx.moveTo(0, midY);
      ctx.lineTo(canvas.clientWidth, midY);
      ctx.stroke();
    }
  </script>
</body>
